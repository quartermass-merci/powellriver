<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Meridian compass + cannabis leaves logo. Drawn as strokes so the favicon
       reads on any tab background (dark Safari, light Chrome). -->
  <g fill="none" stroke="#1F1F1F" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer 8-pointed compass star: long cardinal points, short diagonals -->
    <path d="M64 4 L74 40 L90.9 37.1 L88 54 L124 64 L88 74 L90.9 90.9 L74 88 L64 124 L54 88 L37.1 90.9 L40 74 L4 64 L40 54 L37.1 37.1 L54 40 Z"/>
    <!-- Compass dial circle -->
    <circle cx="64" cy="64" r="26"/>
  </g>

  <!-- 6 cannabis leaves radiating from centre -->
  <g fill="#1F1F1F" transform="translate(64 64)">
    <g id="m-leaf">
      <path d="M0 0 Q-2.5 -8 -3.5 -14 Q-1.5 -16 -1 -19 Q-2.5 -20 -1.5 -22 L0 -24 L1.5 -22 Q2.5 -20 1 -19 Q1.5 -16 3.5 -14 Q2.5 -8 0 0 Z"/>
    </g>
    <use href="#m-leaf" transform="rotate(60)"/>
    <use href="#m-leaf" transform="rotate(120)"/>
    <use href="#m-leaf" transform="rotate(180)"/>
    <use href="#m-leaf" transform="rotate(240)"/>
    <use href="#m-leaf" transform="rotate(300)"/>
  </g>

  <!-- Centre dot -->
  <circle cx="64" cy="64" r="2.5" fill="#1F1F1F"/>
</svg>
